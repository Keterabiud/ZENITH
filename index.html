<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950 text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith • Social Fitness</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .post { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="h-full">
  <div class="max-w-2xl mx-auto min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-zinc-900 border-b border-zinc-800 p-4 flex items-center justify-between sticky top-0 z-50">
      <h1 class="text-3xl font-bold tracking-tighter flex items-center gap-2">
        <span class="text-emerald-500">▲</span> Zenith
      </h1>
      <div class="text-sm text-emerald-400 font-medium">Abiud K • Nairobi</div>
    </header>

    <!-- Main -->
    <main class="flex-1 p-4 overflow-auto">
      <!-- Feed -->
      <div id="tab-0" class="tab-content active">
        <div class="mb-6">
          <textarea id="post-text" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-sm resize-none h-24" placeholder="What did you crush today? 💪"></textarea>
          <button onclick="createPost()" class="mt-2 bg-emerald-500 hover:bg-emerald-600 w-full py-3 rounded-2xl font-semibold">Post Activity</button>
        </div>
        <div id="feed" class="space-y-6"></div>
      </div>

      <!-- Log Workout -->
      <div id="tab-1" class="tab-content">
        <div class="bg-zinc-900 rounded-3xl p-6 space-y-6">
          <input id="workout-type" type="text" placeholder="Run • Lift • Cycle • Yoga" class="w-full bg-zinc-800 rounded-2xl px-5 py-4">
          <div class="grid grid-cols-2 gap-4">
            <input id="distance" type="text" placeholder="Distance (km)" class="bg-zinc-800 rounded-2xl px-5 py-4">
            <input id="duration" type="text" placeholder="Duration (min)" class="bg-zinc-800 rounded-2xl px-5 py-4">
          </div>
          <button onclick="logWorkout()" class="bg-white text-black w-full py-4 rounded-2xl font-bold text-lg">Log & Share to Feed</button>
        </div>
      </div>

      <!-- Leaderboard -->
      <div id="tab-2" class="tab-content">
        <div class="bg-zinc-900 rounded-3xl p-6">
          <h2 class="text-xl font-semibold mb-4">This Week’s Top Crushers 🔥</h2>
          <div id="leaderboard" class="space-y-3"></div>
        </div>
      </div>

      <!-- Profile -->
      <div id="tab-3" class="tab-content text-center py-10">
        <div class="w-24 h-24 mx-auto bg-emerald-500 rounded-full flex items-center justify-center text-5xl mb-4">🏋️</div>
        <h2 class="text-2xl font-bold">Abiud K</h2>
        <p class="text-zinc-400">Nairobi • 42 workouts this month</p>
        <div class="mt-8 grid grid-cols-3 gap-4 text-center">
          <div><div class="text-3xl font-bold">128</div><div class="text-xs text-zinc-400">Kudos</div></div>
          <div><div class="text-3xl font-bold">19</div><div class="text-xs text-zinc-400">Clubs joined</div></div>
          <div><div class="text-3xl font-bold">8</div><div class="text-xs text-zinc-400">PRs this month</div></div>
        </div>
      </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bg-zinc-900 border-t border-zinc-800 p-3 flex justify-around text-2xl sticky bottom-0">
      <i onclick="switchTab(0)" class="fa-solid fa-house cursor-pointer text-emerald-400"></i>
      <i onclick="switchTab(1)" class="fa-solid fa-plus cursor-pointer"></i>
      <i onclick="switchTab(2)" class="fa-solid fa-trophy cursor-pointer"></i>
      <i onclick="switchTab(3)" class="fa-solid fa-user cursor-pointer"></i>
    </nav>

    <footer class="text-center text-[10px] text-zinc-500 py-6 border-t border-zinc-800 bg-zinc-950">
      © 2026 Zenith by KETER. All rights reserved.
    </footer>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
