<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950 text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zenith • Social Fitness</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- Custom styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="h-full antialiased">
  <div class="max-w-2xl mx-auto min-h-screen flex flex-col bg-zinc-950">

    <!-- Header -->
    <header class="bg-zinc-900 border-b border-zinc-800 p-4 flex items-center justify-between sticky top-0 z-50">
      <h1 class="text-3xl font-bold tracking-tighter flex items-center gap-2">
        <span class="text-emerald-500">▲</span> Zenith
      </h1>
      
      <div id="user-info" class="flex items-center gap-3 hidden">
        <img id="user-photo" src="" alt="User" class="w-9 h-9 rounded-full object-cover border border-zinc-700">
        <span id="user-name" class="font-medium text-sm"></span>
        <button onclick="signOutUser()" class="text-xs bg-red-600/30 hover:bg-red-600/50 text-red-300 px-3 py-1.5 rounded-xl transition">
          Sign out
        </button>
      </div>
      
      <button id="login-btn" onclick="signInWithGoogle()" class="bg-white text-black px-5 py-2 rounded-2xl font-semibold flex items-center gap-2 hover:bg-gray-200 transition hidden">
        <i class="fa-brands fa-google"></i> Sign in with Google
      </button>
    </header>

    <!-- Login screen (shown before login) -->
    <div id="login-screen" class="flex-1 flex items-center justify-center p-6 text-center">
      <div class="max-w-sm">
        <div class="text-8xl mb-6">▲</div>
        <h2 class="text-4xl font-bold mb-4">Welcome to Zenith</h2>
        <p class="text-zinc-400 mb-10">Track workouts. Share progress. Crush goals together.</p>
        <button onclick="signInWithGoogle()" class="bg-white text-black w-full py-4 rounded-3xl font-bold text-lg flex items-center justify-center gap-3 hover:bg-gray-200 transition">
          <i class="fa-brands fa-google text-xl"></i> Continue with Google
        </button>
      </div>
    </div>

    <!-- Main app (hidden until logged in) -->
    <main id="main-app" class="flex-1 p-4 overflow-y-auto hidden">
      
      <!-- Tabs content -->
      <div id="tab-0" class="tab-content">
        <div class="mb-6">
          <textarea id="post-text" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-sm resize-none h-28 focus:outline-none focus:border-emerald-500" placeholder="What did you crush today? 💪 Share your workout..."></textarea>
          <button onclick="createPost()" class="mt-3 bg-emerald-600 hover:bg-emerald-500 w-full py-3 rounded-2xl font-semibold transition">Post Activity</button>
        </div>
        <div id="feed" class="space-y-6"></div>
      </div>

      <div id="tab-1" class="tab-content hidden">
        <div class="bg-zinc-900 rounded-3xl p-6 space-y-6">
          <input id="workout-type" type="text" placeholder="Run • Lift • Cycle • Yoga • ..." class="w-full bg-zinc-800 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-emerald-500">
          <div class="grid grid-cols-2 gap-4">
            <input id="distance" type="text" placeholder="Distance (km)" class="bg-zinc-800 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-emerald-500">
            <input id="duration" type="text" placeholder="Duration (min)" class="bg-zinc-800 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-emerald-500">
          </div>
          <button onclick="logWorkout()" class="bg-white text-black w-full py-4 rounded-2xl font-bold text-lg hover:bg-gray-200 transition">Log & Share</button>
        </div>
      </div>

      <div id="tab-2" class="tab-content hidden">
        <div class="bg-zinc-900 rounded-3xl p-6">
          <h2 class="text-xl font-semibold mb-5">This Week’s Top Crushers 🔥</h2>
          <div id="leaderboard" class="space-y-4">
            <!-- Mock leaderboard – can connect to Firestore later -->
            <div class="flex items-center justify-between bg-zinc-800 px-5 py-4 rounded-2xl">
              <div class="flex items-center gap-3"><span class="text-2xl">🥇</span><span class="font-medium">You</span></div>
              <span class="font-mono text-emerald-400">1,450 pts</span>
            </div>
            <!-- more mock items... -->
          </div>
        </div>
      </div>

      <div id="tab-3" class="tab-content hidden text-center py-10">
        <div class="w-28 h-28 mx-auto bg-gradient-to-br from-emerald-600 to-emerald-400 rounded-full flex items-center justify-center text-6xl mb-6 shadow-lg">🏋️</div>
        <h2 id="profile-name" class="text-2xl font-bold mb-2">Your Name</h2>
        <p class="text-zinc-400 mb-8">Nairobi • Keep pushing!</p>
        <div class="grid grid-cols-3 gap-6 text-center">
          <div><div class="text-4xl font-bold">0</div><div class="text-sm text-zinc-400">Kudos</div></div>
          <div><div class="text-4xl font-bold">0</div><div class="text-sm text-zinc-400">Workouts</div></div>
          <div><div class="text-4xl font-bold">0</div><div class="text-sm text-zinc-400">Streaks</div></div>
        </div>
      </div>
    </main>

    <!-- Bottom navigation -->
    <nav class="bg-zinc-900 border-t border-zinc-800 p-4 flex justify-around text-3xl sticky bottom-0 z-50 md:hidden">
      <i onclick="switchTab(0)" class="fa-solid fa-house cursor-pointer text-emerald-400"></i>
      <i onclick="switchTab(1)" class="fa-solid fa-plus cursor-pointer"></i>
      <i onclick="switchTab(2)" class="fa-solid fa-trophy cursor-pointer"></i>
      <i onclick="switchTab(3)" class="fa-solid fa-user cursor-pointer"></i>
    </nav>

    <!-- Desktop tabs (alternative to bottom nav) -->
    <div class="hidden md:flex bg-zinc-900 border-t border-zinc-800 p-4 justify-center gap-8 sticky bottom-0 z-50">
      <button onclick="switchTab(0)" class="tab-btn px-6 py-2 rounded-xl font-medium">Feed</button>
      <button onclick="switchTab(1)" class="tab-btn px-6 py-2 rounded-xl font-medium">Log</button>
      <button onclick="switchTab(2)" class="tab-btn px-6 py-2 rounded-xl font-medium">Leaderboard</button>
      <button onclick="switchTab(3)" class="tab-btn px-6 py-2 rounded-xl font-medium">Profile</button>
    </div>

    <!-- Copyright -->
    <footer class="text-center text-xs text-zinc-600 py-6 border-t border-zinc-800 bg-zinc-950">
      © 2026 Zenith by KETER. All rights reserved.
    </footer>

  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
