<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950 text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zenith • Social Fitness (Demo)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="h-full antialiased">
  <div class="max-w-2xl mx-auto min-h-screen flex flex-col bg-zinc-950">

    <!-- Header -->
    <header class="bg-zinc-900 border-b border-zinc-800 p-4 flex items-center justify-between sticky top-0 z-50">
      <h1 class="text-3xl font-bold tracking-tighter flex items-center gap-2">
        <span class="text-emerald-500">▲</span> Zenith
      </h1>
      <div class="text-sm text-zinc-400">Demo Mode (No Login)</div>
    </header>

    <!-- Main content -->
    <main class="flex-1 p-4 overflow-y-auto">
      <!-- Feed Tab (mock data) -->
      <div id="tab-0" class="tab-content">
        <div class="mb-6">
          <textarea id="post-text" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-sm resize-none h-28 focus:outline-none focus:border-emerald-500" placeholder="What did you crush today? (Demo - posts stay in browser only)"></textarea>
          <button onclick="createPost()" class="mt-3 bg-emerald-600 hover:bg-emerald-500 w-full py-3 rounded-2xl font-semibold transition">Post (Local Only)</button>
        </div>
        <div id="feed" class="space-y-6"></div>
      </div>

      <!-- Log Tab (mock) -->
      <div id="tab-1" class="tab-content hidden">
        <div class="bg-zinc-900 rounded-3xl p-6 space-y-6">
          <input id="workout-type" type="text" placeholder="Run • Lift • ..." class="w-full bg-zinc-800 rounded-2xl px-5 py-4">
          <div class="grid grid-cols-2 gap-4">
            <input id="distance" type="text" placeholder="Distance (km)">
            <input id="duration" type="text" placeholder="Duration (min)">
          </div>
          <button onclick="logWorkout()" class="bg-white text-black w-full py-4 rounded-2xl font-bold text-lg">Log (Local)</button>
        </div>
      </div>

      <!-- Leaderboard & Profile (mock) -->
      <div id="tab-2" class="tab-content hidden">...</div> <!-- Add mock content if needed -->
      <div id="tab-3" class="tab-content hidden text-center py-10">...</div>
    </main>

    <!-- Bottom nav -->
    <nav class="bg-zinc-900 border-t border-zinc-800 p-4 flex justify-around text-3xl sticky bottom-0 z-50">
      <i onclick="switchTab(0)" class="fa-solid fa-house cursor-pointer text-emerald-400"></i>
      <i onclick="switchTab(1)" class="fa-solid fa-plus cursor-pointer"></i>
      <i onclick="switchTab(2)" class="fa-solid fa-trophy cursor-pointer"></i>
      <i onclick="switchTab(3)" class="fa-solid fa-user cursor-pointer"></i>
    </nav>

    <!-- Copyright -->
    <footer class="text-center text-xs text-zinc-600 py-6 border-t border-zinc-800 bg-zinc-950">
      © 2026 Zenith by KETER. All rights reserved.
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
